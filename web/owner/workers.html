<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Owner Workers</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js?v=v2full"></script><script src="/common/supabase.js?v=v2full"></script><script src="/common/auth-live.js?v=v2full"></script><script src="/common/nav.js?v=v2full"></script></head><body><div class="page-wrap"><div id="menu"></div><div class="form-card"><h2>Assign Worker</h2><form id="f"><label>Worker Email (must already exist)</label><input id="email" type="email" required><div class="form-row" style="margin-top:14px"><div><label>Venue</label><select id="venue_id"></select></div><div><label>Access Level</label><select id="access_level"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div></div><div class="form-actions"><button type="submit">Assign Worker</button></div></form><p id="s" class="notice" style="display:none;margin-top:14px"></p></div><div class="table-wrap"><table><thead><tr><th>Email</th><th>Venue</th><th>Level</th><th>Active</th></tr></thead><tbody id="tb"></tbody></table></div></div><script>menu.innerHTML=LinkdNNav.owner();let me;function msg(t){s.style.display='block';s.textContent=t}async function loadVenues(){const supabase=LinkdNSupabase.getClient();const {data}=await supabase.from('venues').select('id,name').eq('owner_profile_id',me.id).order('name');venue_id.innerHTML=(data||[]).map(v=>`<option value="${v.id}">${v.name}</option>`).join('');}async function loadWorkers(){const supabase=LinkdNSupabase.getClient();const {data,error}=await supabase.from('venue_workers').select('access_level,active,profiles:profile_id(email),venues:venue_id(name)').in('venue_id',(await supabase.from('venues').select('id').eq('owner_profile_id',me.id)).data.map(v=>v.id));if(error){msg(error.message);return}tb.innerHTML=(data&&data.length)?data.map(r=>`<tr><td>${r.profiles?.email||'-'}</td><td>${r.venues?.name||'-'}</td><td>${r.access_level}</td><td>${r.active?'Yes':'No'}</td></tr>`).join(''):'<tr><td colspan="4">No workers yet.</td></tr>';}async function init(){me=await LinkdNAuthLive.getProfile();if(!me){location.href='/auth/login.html';return}await loadVenues();await loadWorkers();}f.addEventListener('submit',async e=>{e.preventDefault();msg('Assigning...');try{const supabase=LinkdNSupabase.getClient();const lookup=await supabase.from('profiles').select('id,email').eq('email',email.value.trim().toLowerCase()).maybeSingle();if(lookup.error||!lookup.data) throw new Error('Worker profile not found.');const {error}=await supabase.from('venue_workers').upsert({venue_id:venue_id.value,profile_id:lookup.data.id,access_level:access_level.value,active:true,assigned_by:me.id},{onConflict:'venue_id,profile_id'});if(error) throw error;msg('Worker assigned.');f.reset();await loadWorkers();}catch(err){console.error(err);msg(err.message||'Assignment failed.')}});init();</script></body></html>
