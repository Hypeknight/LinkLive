<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Workers</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth-live.js"></script><script src="/common/ui.js"></script></head><body><div id="app"></div><script>async function init(){const p=await LinkdNAuthLive.requireRole(['owner']); if(!p) return; document.getElementById('app').innerHTML=`${LinkdNUI.topbar('Workers & employees', LinkdNUI.ownerNav())}<div class="page-wrap"><div class="form-card"><h2>Assign worker to venue</h2><form id="form" class="form-stack"><input id="email" type="email" placeholder="Existing user email" required><input id="display_name" placeholder="Display name" required><select id="venue_id"></select><select id="access_level"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select><div class="form-actions"><button type="submit">Assign worker</button></div></form><p id="status" class="notice hidden"></p></div><div class="table-wrap" style="margin-top:16px"><table class="table"><thead><tr><th>Name</th><th>Email</th><th>Venue</th><th>Access</th><th>Active</th></tr></thead><tbody id="rows"></tbody></table></div></div>`; LinkdNUI.bindLogout(LinkdNAuthLive.signOut); const sb=LinkdNSupabase.getClient(); const {data:venues}=await sb.from('venues').select('id,name').eq('owner_profile_id',p.id).order('name'); const sel=document.getElementById('venue_id'); sel.innerHTML=(venues||[]).map(v=>`<option value="${v.id}">${v.name}</option>`).join(''); async function loadRows(){const {data,error}=await sb.from('venue_workers').select('id,access_level,active,profiles:profile_id(display_name,email),venues:venue_id(name)').in('venue_id',(venues||[]).map(v=>v.id)); const tbody=document.getElementById('rows'); if(error){tbody.innerHTML=`<tr><td colspan="5">${error.message}</td></tr>`;return;} tbody.innerHTML=(data||[]).map(r=>`<tr><td>${r.profiles?.display_name||'-'}</td><td>${r.profiles?.email||'-'}</td><td>${r.venues?.name||'-'}</td><td>${r.access_level}</td><td>${r.active?'Yes':'No'}</td></tr>`).join('')||'<tr><td colspan="5">No workers.</td></tr>';} await loadRows(); document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();const email=document.getElementById('email').value.trim().toLowerCase(); const {data:profile,error:pe}=await sb.from('profiles').select('*').eq('email',email).single(); const status=document.getElementById('status'); status.classList.remove('hidden'); if(pe||!profile){status.textContent='That user must already exist.'; return;} await sb.from('profiles').update({display_name:document.getElementById('display_name').value.trim(), role:'worker'}).eq('id',profile.id); const {error}=await sb.from('venue_workers').upsert({venue_id:document.getElementById('venue_id').value, profile_id:profile.id, access_level:document.getElementById('access_level').value, active:true, assigned_by:p.id},{onConflict:'venue_id,profile_id'}); status.textContent=error?(error.message||'Could not assign'):'Worker assigned.'; if(!error) loadRows();});} init();</script></body></html>
