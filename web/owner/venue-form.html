<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Venue Form</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth-live.js"></script><script src="/common/ui.js"></script></head><body><div id="app"></div><script>function slugify(name,city,state){return [name,city,state].filter(Boolean).join('-').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').replace(/-{2,}/g,'-')} async function init(){const p=await LinkdNAuthLive.requireRole(['owner']); if(!p) return; const qp=new URLSearchParams(location.search); const venueId=qp.get('id'); document.getElementById('app').innerHTML=`${LinkdNUI.topbar(venueId?'Edit venue':'Add venue', LinkdNUI.ownerNav())}<div class="page-wrap"><div class="form-card"><h2>${venueId?'Edit venue':'Create venue'}</h2><form id="form" class="form-stack"><input id="name" placeholder="Venue name" required><input id="street_address" placeholder="Street address" required><div class="form-row"><input id="city" placeholder="City" required><input id="state" placeholder="State" maxlength="2" required></div><input id="zip" placeholder="ZIP" required><input id="during_hours_contact_name" placeholder="During-hours contact name" required><input id="during_hours_contact_phone" placeholder="During-hours contact phone" required><input id="active_email" type="email" placeholder="Active email" required><textarea id="description" placeholder="Description"></textarea><div class="form-actions"><button type="submit">Save venue</button></div></form><p class="notice">New venues start in pending_payment and are not searchable until billing success, coupon, or admin override.</p><p id="status" class="notice hidden"></p></div></div>`; LinkdNUI.bindLogout(LinkdNAuthLive.signOut); const sb=LinkdNSupabase.getClient(); if(venueId){const {data}=await sb.from('venues').select('*').eq('id',venueId).single(); if(data){for(const k of ['name','street_address','city','state','zip','during_hours_contact_name','during_hours_contact_phone','active_email','description']){document.getElementById(k).value=data[k]||'';}}} document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();const payload={owner_profile_id:p.id,name:document.getElementById('name').value.trim(),street_address:document.getElementById('street_address').value.trim(),city:document.getElementById('city').value.trim(),state:document.getElementById('state').value.trim().toUpperCase(),zip:document.getElementById('zip').value.trim(),during_hours_contact_name:document.getElementById('during_hours_contact_name').value.trim(),during_hours_contact_phone:document.getElementById('during_hours_contact_phone').value.trim(),active_email:document.getElementById('active_email').value.trim(),description:document.getElementById('description').value.trim(),slug:slugify(document.getElementById('name').value,document.getElementById('city').value,document.getElementById('state').value),venue_status:'pending_payment',searchable:false,active:true}; let result; if(venueId){result=await sb.from('venues').update(payload).eq('id',venueId);} else {result=await sb.from('venues').insert(payload).select().single(); if(!result.error && result.data){await sb.from('venue_settings').upsert({venue_id:result.data.id}); await sb.from('venue_metrics').upsert({venue_id:result.data.id}); await sb.from('venue_billing').upsert({venue_id:result.data.id,billing_status:'pending_payment',current_plan:'starter',amount_due:99,amount_paid:0}); await sb.from('venue_workers').upsert({venue_id:result.data.id,profile_id:p.id,access_level:'high',active:true,assigned_by:p.id}); }} const s=document.getElementById('status'); s.classList.remove('hidden'); if(result.error){s.textContent=result.error.message||'Could not save venue'; return;} s.textContent='Venue saved.'; setTimeout(()=>location.href='/owner/venues.html',700);});} init();</script></body></html>
