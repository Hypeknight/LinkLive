<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Owner Profile</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js?v=v2full"></script><script src="/common/supabase.js?v=v2full"></script><script src="/common/auth-live.js?v=v2full"></script><script src="/common/nav.js?v=v2full"></script></head><body><div class="page-wrap"><div id="menu"></div><div class="form-card"><h2>Edit Profile</h2><form id="f"><label>Display Name</label><input id="display_name"><label style="margin-top:14px">Phone</label><input id="phone"><label style="margin-top:14px">Email</label><input id="email" disabled><div class="form-actions"><button type="submit">Save</button></div></form><p id="s" class="notice" style="display:none;margin-top:14px"></p></div></div><script>menu.innerHTML=LinkdNNav.owner();let profile;async function load(){profile=await LinkdNAuthLive.getProfile();if(!profile){location.href='/auth/login.html';return}display_name.value=profile.display_name||'';phone.value=profile.phone||'';email.value=profile.email||'';}f.addEventListener('submit',async e=>{e.preventDefault();s.style.display='none';try{const supabase=LinkdNSupabase.getClient();const {error}=await supabase.from('profiles').update({display_name:display_name.value.trim(),phone:phone.value.trim()}).eq('id',profile.id);if(error) throw error;s.style.display='block';s.textContent='Profile updated.';}catch(err){s.style.display='block';s.textContent=err.message||'Update failed.';console.error(err);}});load();</script></body></html>
