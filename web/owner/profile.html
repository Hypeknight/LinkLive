<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Owner Profile</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth-live.js"></script><script src="/common/ui.js"></script></head><body><div id="app"></div><script>async function init(){const p=await LinkdNAuthLive.requireRole(['owner']); if(!p) return; document.getElementById('app').innerHTML=`${LinkdNUI.topbar('Owner profile', LinkdNUI.ownerNav())}<div class="page-wrap"><div class="form-card"><h2>Edit profile</h2><form id="form" class="form-stack"><input id="display_name" value="${p.display_name||''}" required><input id="email" value="${p.email||''}" disabled><input id="phone" value="${p.phone||''}" placeholder="Phone"><div class="form-actions"><button type="submit">Save profile</button></div></form><p id="status" class="notice hidden"></p></div></div>`; LinkdNUI.bindLogout(LinkdNAuthLive.signOut); document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();const sb=LinkdNSupabase.getClient(); const {error}=await sb.from('profiles').update({display_name:document.getElementById('display_name').value.trim(), phone:document.getElementById('phone').value.trim()}).eq('id',p.id); const s=document.getElementById('status'); s.classList.remove('hidden'); s.textContent=error?(error.message||'Could not update'):'Profile updated.';});} init();</script></body></html>
