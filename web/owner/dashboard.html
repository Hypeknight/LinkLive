<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Owner Dashboard</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth-live.js"></script><script src="/common/ui.js"></script></head><body><div id="app"></div><script>async function init(){const p=await LinkdNAuthLive.requireRole(['owner']); if(!p) return; document.getElementById('app').innerHTML=`${LinkdNUI.topbar('Owner dashboard', LinkdNUI.ownerNav())}<div class="page-wrap"><div class="summary-grid"><div class="metric-card"><h3>Owner</h3><div>${p.display_name||'-'}</div><div class="small">${p.email||''}</div></div><div class="metric-card"><h3>Venues</h3><div id="venueCount">...</div></div><div class="metric-card"><h3>Workers</h3><div id="workerCount">...</div></div></div><div class="feature-grid" style="margin-top:16px"><div class="feature-card"><h3>My venues</h3><div id="venueList">Loading...</div><div class="form-actions"><a href="/owner/venues.html"><button>Manage venues</button></a></div></div><div class="feature-card"><h3>Quick actions</h3><div class="dashboard-links"><a href="/owner/profile.html">Edit profile</a><a href="/owner/workers.html">Manage workers</a><a href="/owner/billing.html">Billing</a></div></div><div class="feature-card"><h3>Messaging</h3><p>Messaging scaffolding is included. Wire conversations next.</p><div class="form-actions"><a href="/owner/messaging.html"><button>Open messaging</button></a></div></div></div></div>`; LinkdNUI.bindLogout(LinkdNAuthLive.signOut); const sb=LinkdNSupabase.getClient(); const [{data:venues},{count:workers}] = await Promise.all([sb.from('venues').select('*').eq('owner_profile_id', p.id).order('created_at',{ascending:false}), sb.from('venue_workers').select('*',{count:'exact',head:true})]); document.getElementById('venueCount').textContent=(venues||[]).length; document.getElementById('workerCount').textContent=workers||0; document.getElementById('venueList').innerHTML=(venues||[]).length?venues.map(v=>`<div class="pill">${v.name} - ${v.venue_status}</div>`).join(''):'<div class="notice">No venues yet.</div>'; } init();</script></body></html>
