<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Dashboard - Linkd'N</title>
  <link rel="stylesheet" href="/common/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/common/config.js?v=debug1"></script>
  <script src="/common/supabase.js?v=debug1"></script>
  <script src="/common/auth-live.js?v=debug1"></script>
  <script src="/common/nav.js?v=debug1"></script>
</head>
<body>
  <div class="page-wrap">
    <div id="menu"></div>

    <div class="form-card">
      <h2>Owner Dashboard</h2>
      <p id="status" class="notice">Loading dashboard...</p>
    </div>

    <div class="feature-grid" style="margin-top:20px;">
      <div class="feature-card">
        <h3>My Profile</h3>
        <p><strong>Name:</strong> <span id="displayName">-</span></p>
        <p><strong>Email:</strong> <span id="email">-</span></p>
        <p><strong>Role:</strong> <span id="role">-</span></p>
      </div>

      <div class="feature-card">
        <h3>My Venues</h3>
        <div id="venuesList">Loading...</div>
      </div>

      <div class="feature-card">
        <h3>Quick Actions</h3>
        <div class="form-actions" style="flex-direction:column;">
          <a href="/owner/profile.html"><button type="button">Edit Profile</button></a>
          <a href="/owner/venues.html"><button type="button">Manage Venues</button></a>
          <a href="/owner/workers.html"><button type="button">Workers</button></a>
          <a href="/owner/billing.html"><button type="button">Billing</button></a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("status");

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    async function initDashboard() {
      try {
        if (!window.LinkdNNav) throw new Error("LinkdNNav is not loaded.");
        if (!window.LinkdNAuthLive) throw new Error("LinkdNAuthLive is not loaded.");
        if (!window.LinkdNSupabase) throw new Error("LinkdNSupabase is not loaded.");

        document.getElementById("menu").innerHTML = LinkdNNav.owner
          ? LinkdNNav.owner()
          : `<nav class="app-nav">
              <a href="/owner/dashboard.html">Dashboard</a>
              <a href="/owner/profile.html">Profile</a>
              <a href="/owner/venues.html">Venues</a>
              <a href="/owner/workers.html">Workers</a>
              <a href="/owner/billing.html">Billing</a>
            </nav>`;

        const profile = await LinkdNAuthLive.getProfile();

        if (!profile) {
          setStatus("No logged in user found. Redirecting to login...");
          setTimeout(() => location.href = "/auth/login.html", 800);
          return;
        }

        document.getElementById("displayName").textContent = profile.display_name || "-";
        document.getElementById("email").textContent = profile.email || "-";
        document.getElementById("role").textContent = profile.role || "-";

        const supabase = window.LinkdNSupabase.getClient();

        const { data: venues, error: venueError } = await supabase
          .from("venues")
          .select("*")
          .eq("owner_profile_id", profile.id)
          .order("created_at", { ascending: false });

        if (venueError) throw venueError;

        const venuesList = document.getElementById("venuesList");
        if (!venues || venues.length === 0) {
          venuesList.innerHTML = `<div class="notice">No venues yet.</div>`;
        } else {
          venuesList.innerHTML = venues.map(v => `
            <div class="pill">${v.name} - ${v.venue_status || "pending_payment"}</div>
          `).join("");
        }

        setStatus("Dashboard loaded.");
      } catch (err) {
        console.error(err);
        setStatus(err.message || "Dashboard failed to load.");
      }
    }

    initDashboard();
  </script>
</body>
</html>
