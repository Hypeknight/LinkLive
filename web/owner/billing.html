<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Owner Billing</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js?v=v2full"></script><script src="/common/supabase.js?v=v2full"></script><script src="/common/auth-live.js?v=v2full"></script><script src="/common/nav.js?v=v2full"></script></head><body><div class="page-wrap"><div id="menu"></div><div class="card"><h2>Billing</h2><p class="notice">Simulated billing/paywall interface.</p><div class="table-wrap"><table><thead><tr><th>Venue</th><th>Status</th><th>Plan</th><th>Amount Due</th></tr></thead><tbody id="tb"></tbody></table></div></div></div><script>menu.innerHTML=LinkdNNav.owner();async function init(){const me=await LinkdNAuthLive.getProfile();if(!me){location.href='/auth/login.html';return}const supabase=LinkdNSupabase.getClient();const venues=(await supabase.from('venues').select('id,name').eq('owner_profile_id',me.id)).data||[];if(!venues.length){tb.innerHTML='<tr><td colspan="4">No venues yet.</td></tr>';return}const ids=venues.map(v=>v.id);const billing=(await supabase.from('venue_billing').select('*').in('venue_id',ids)).data||[];tb.innerHTML=venues.map(v=>{const b=billing.find(x=>x.venue_id===v.id)||{};return `<tr><td>${v.name}</td><td>${b.billing_status||'pending_payment'}</td><td>${b.current_plan||'starter'}</td><td>$${Number(b.amount_due||0).toFixed(2)}</td></tr>`}).join('');}init();</script></body></html>
