<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Billing</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth-live.js"></script><script src="/common/ui.js"></script></head><body><div id="app"></div><script>async function init(){const p=await LinkdNAuthLive.requireRole(['owner']); if(!p) return; document.getElementById('app').innerHTML=`${LinkdNUI.topbar('Billing', LinkdNUI.ownerNav())}<div class="page-wrap"><div class="notice">This is a simulated paywall interface. A venue is not live until billing succeeds, coupon is applied, or admin overrides activation.</div><div class="table-wrap" style="margin-top:16px"><table class="table"><thead><tr><th>Venue</th><th>Billing status</th><th>Amount due</th><th>Venue status</th><th>Simulate</th></tr></thead><tbody id="rows"></tbody></table></div></div>`; LinkdNUI.bindLogout(LinkdNAuthLive.signOut); const sb=LinkdNSupabase.getClient(); const {data:venues}=await sb.from('venues').select('id,name,venue_status').eq('owner_profile_id',p.id); const ids=(venues||[]).map(v=>v.id); const {data:billing}=ids.length?await sb.from('venue_billing').select('*').in('venue_id',ids):{data:[]}; const map=Object.fromEntries((billing||[]).map(b=>[b.venue_id,b])); const tbody=document.getElementById('rows'); tbody.innerHTML=(venues||[]).map(v=>{const b=map[v.id]||{}; return `<tr><td>${v.name}</td><td>${b.billing_status||'pending_payment'}</td><td>$${Number(b.amount_due||0).toFixed(2)}</td><td>${v.venue_status}</td><td><button onclick="simulatePay('${v.id}')">Simulate pay</button></td></tr>`;}).join('')||'<tr><td colspan="5">No venues.</td></tr>'; window.simulatePay=async venueId=>{await sb.from('venue_billing').upsert({venue_id:venueId,billing_status:'paid',amount_due:0,amount_paid:99,current_plan:'starter'},{onConflict:'venue_id'}); await sb.from('venues').update({venue_status:'live',searchable:true}).eq('id',venueId); location.reload();};} init();</script></body></html>
