<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Owner Venues</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth-live.js"></script><script src="/common/ui.js"></script></head><body><div id="app"></div><script>async function load(){const p=await LinkdNAuthLive.requireRole(['owner']); if(!p) return; document.getElementById('app').innerHTML=`${LinkdNUI.topbar('My venues', LinkdNUI.ownerNav())}<div class="page-wrap"><div class="form-actions"><a href="/owner/venue-form.html"><button>Add venue</button></a></div><div class="table-wrap" style="margin-top:16px"><table class="table"><thead><tr><th>Name</th><th>Address</th><th>Status</th><th>Searchable</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table></div></div>`; LinkdNUI.bindLogout(LinkdNAuthLive.signOut); const sb=LinkdNSupabase.getClient(); const {data,error}=await sb.from('venues').select('*').eq('owner_profile_id', p.id).order('created_at',{ascending:false}); const tbody=document.getElementById('rows'); if(error){tbody.innerHTML=`<tr><td colspan="5">${error.message}</td></tr>`; return;} if(!data.length){tbody.innerHTML='<tr><td colspan="5">No venues yet.</td></tr>'; return;} tbody.innerHTML=data.map(v=>`<tr><td>${v.name}</td><td>${[v.street_address||'',v.city||'',v.state||'',v.zip||''].filter(Boolean).join(', ')}</td><td>${v.venue_status}</td><td>${v.searchable?'Yes':'No'}</td><td><a href="/owner/venue-form.html?id=${v.id}">Edit</a> · <a href="/venue/dashboard.html?venue=${v.id}">Open venue</a></td></tr>`).join('');} load();</script></body></html>
