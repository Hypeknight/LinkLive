<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Owner Venues</title>
        <link rel="stylesheet" href="/common/app.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="/common/config.js"></script>
        <script src="/common/supabase.js"></script>
        <script src="/common/auth-live.js"></script>
        <script src="/common/nav.js"></script>
    </head>
    <body>
        <div class="page-wrap">
            <div id="menu"></div>
            <div class="form-card">
                <h2>My Venues</h2>
                <p id="status" class="notice">Loading...</p>
            </div>
            <div id="venues" class="feature-grid" style="margin-top:20px">
                <!-- Venue cards will be populated here -->
            </div>
        </div>
        <script>
            const status = document.getElementById('status');
            function setStatus(m) {
                status.textContent = m;
            }
            async function init() {
                try {
                    menu.innerHTML = LinkdNNav.owner();
                    const p = await LinkdNAuthLive.getProfile();
                    if (!p) {
                        location.href = '/auth/login.html';
                        return;
                    }
                    const supabase = LinkdNSupabase.getClient();
                    const { data, error } = await supabase.from('venues').select('*').eq('owner_profile_id', p.id).order('created_at', { ascending: false });
                    if (error) throw error;
                    venues.innerHTML = (data && data.length) ? data.map(v => `<div class="feature-card"><h3>${v.name}</h3><p><strong>Status:</strong> ${v.venue_status || 'pending_payment'}</p></div>`).join('') : '<div class="notice">No venues yet.</div>';
                    setStatus('Venues loaded.');
                } catch (err) {
                    console.error(err);
                    setStatus(err.message || 'Failed to load venues.');
                }
            }
            init();
        </script>
    </body>
</html>
