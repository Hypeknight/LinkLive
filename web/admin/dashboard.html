<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Dashboard</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js?v=v2full"></script><script src="/common/supabase.js?v=v2full"></script><script src="/common/auth-live.js?v=v2full"></script><script src="/common/nav.js?v=v2full"></script></head><body><div class="page-wrap"><div id="menu"></div><div class="form-card"><h2>Admin Dashboard</h2><p id="status" class="notice">Loading...</p></div><div class="metric-grid" style="margin-top:20px"><div class="metric-card"><h3>Profiles</h3><div class="summary-value" id="pc">0</div></div><div class="metric-card"><h3>Venues</h3><div class="summary-value" id="vc">0</div></div><div class="metric-card"><h3>Workers</h3><div class="summary-value" id="wc">0</div></div></div></div><script>menu.innerHTML=LinkdNNav.admin();async function init(){try{const p=await LinkdNAuthLive.getProfile();if(!p){location.href='/auth/login.html';return}if(!['admin','moderator'].includes(p.role)){location.href='/owner/dashboard.html';return}const supabase=LinkdNSupabase.getClient();const [{count:pcnt,error:e1},{count:vcnt,error:e2},{count:wcnt,error:e3}] = await Promise.all([supabase.from('profiles').select('*',{count:'exact',head:true}),supabase.from('venues').select('*',{count:'exact',head:true}),supabase.from('venue_workers').select('*',{count:'exact',head:true})]);if(e1||e2||e3) throw e1||e2||e3;pc.textContent=pcnt||0;vc.textContent=vcnt||0;wc.textContent=wcnt||0;status.textContent='Admin dashboard loaded.';}catch(err){console.error(err);status.textContent=err.message||'Failed to load admin dashboard.'}}init();</script></body></html>
