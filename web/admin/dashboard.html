<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Dashboard</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth-live.js"></script><script src="/common/ui.js"></script></head><body><div id="app"></div><script>async function init(){const p=await LinkdNAuthLive.requireRole(['moderator','admin']); if(!p) return; document.getElementById('app').innerHTML=`${LinkdNUI.topbar('Admin dashboard', LinkdNUI.adminNav())}<div class="page-wrap"><div class="summary-grid"><div class="metric-card"><h3>User</h3><div>${p.display_name||'-'}</div><div class="small">${p.role}</div></div><div class="metric-card"><h3>Venues</h3><div id="venues">...</div></div><div class="metric-card"><h3>Workers</h3><div id="workers">...</div></div></div><div class="card" style="margin-top:16px"><h3>System</h3><div id="metricsStatus">Loading metrics...</div></div></div>`; LinkdNUI.bindLogout(LinkdNAuthLive.signOut); const res=await fetch(`${window.LINKDN_CONFIG.API_BASE}/api/admin/metrics`); const data=await res.json(); document.getElementById('venues').textContent=data.venues??0; document.getElementById('workers').textContent=data.workers??0; document.getElementById('metricsStatus').textContent=`Profiles: ${data.profiles??0}, Rooms: ${data.rooms??0}, Patron polls: ${data.polls??0}`;} init();</script></body></html>
