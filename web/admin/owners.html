<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Owners</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth-live.js"></script><script src="/common/ui.js"></script></head><body><div id="app"></div><script>async function init(){const p=await LinkdNAuthLive.requireRole(['moderator','admin']); if(!p) return; document.getElementById('app').innerHTML=`${LinkdNUI.topbar('Owners', LinkdNUI.adminNav())}<div class="page-wrap"><div class="table-wrap"><table class="table"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Active</th></tr></thead><tbody id="rows"></tbody></table></div></div>`; LinkdNUI.bindLogout(LinkdNAuthLive.signOut); const sb=LinkdNSupabase.getClient(); const {data,error}=await sb.from('profiles').select('*').in('role',['owner','moderator','admin']).order('created_at',{ascending:false}); const tbody=document.getElementById('rows'); if(error){tbody.innerHTML=`<tr><td colspan="4">${error.message}</td></tr>`; return;} tbody.innerHTML=(data||[]).map(r=>`<tr><td>${r.display_name||'-'}</td><td>${r.email||'-'}</td><td>${r.role}</td><td>${r.active?'Yes':'No'}</td></tr>`).join('')||'<tr><td colspan="4">No users.</td></tr>';} init();</script></body></html>
