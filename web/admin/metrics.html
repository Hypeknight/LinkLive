<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Metrics</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth-live.js"></script><script src="/common/ui.js"></script></head><body><div id="app"></div><script>async function init(){const p=await LinkdNAuthLive.requireRole(['moderator','admin']); if(!p) return; document.getElementById('app').innerHTML=`${LinkdNUI.topbar('Metrics', LinkdNUI.adminNav())}<div class="page-wrap"><div id="metrics" class="notice">Loading...</div></div>`; LinkdNUI.bindLogout(LinkdNAuthLive.signOut); const res=await fetch(`${window.LINKDN_CONFIG.API_BASE}/api/admin/metrics`); const data=await res.json(); document.getElementById('metrics').textContent=JSON.stringify(data,null,2);} init();</script></body></html>
