<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Metrics</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js?v=v2full"></script><script src="/common/supabase.js?v=v2full"></script><script src="/common/auth-live.js?v=v2full"></script><script src="/common/nav.js?v=v2full"></script></head><body><div class="page-wrap"><div id="menu"></div><div class="metric-grid"><div class="metric-card"><h3>Rooms</h3><div class="summary-value" id="rc">0</div></div><div class="metric-card"><h3>Schedules</h3><div class="summary-value" id="sc">0</div></div><div class="metric-card"><h3>Polls</h3><div class="summary-value" id="pc">0</div></div></div></div><script>menu.innerHTML=LinkdNNav.admin();async function init(){const p=await LinkdNAuthLive.getProfile();if(!p||!['admin','moderator'].includes(p.role)){location.href='/auth/login.html';return}const supabase=LinkdNSupabase.getClient();const [{count:r},{count:s},{count:pl}] = await Promise.all([supabase.from('rooms').select('*',{count:'exact',head:true}),supabase.from('schedules').select('*',{count:'exact',head:true}),supabase.from('patron_polls').select('*',{count:'exact',head:true})]);rc.textContent=r||0;sc.textContent=s||0;pc.textContent=pl||0;}init();</script></body></html>
