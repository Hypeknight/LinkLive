<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Billing</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js?v=v2full"></script><script src="/common/supabase.js?v=v2full"></script><script src="/common/auth-live.js?v=v2full"></script><script src="/common/nav.js?v=v2full"></script></head><body><div class="page-wrap"><div id="menu"></div><div class="card"><h2>Billing</h2><div class="table-wrap"><table><thead><tr><th>Venue</th><th>Status</th><th>Plan</th><th>Due</th><th>Paid</th></tr></thead><tbody id="tb"></tbody></table></div></div></div><script>menu.innerHTML=LinkdNNav.admin();async function init(){const p=await LinkdNAuthLive.getProfile();if(!p||!['admin','moderator'].includes(p.role)){location.href='/auth/login.html';return}const supabase=LinkdNSupabase.getClient();const venues=(await supabase.from('venues').select('id,name')).data||[];const billing=(await supabase.from('venue_billing').select('*')).data||[];tb.innerHTML=venues.map(v=>{const b=billing.find(x=>x.venue_id===v.id)||{};return `<tr><td>${v.name}</td><td>${b.billing_status||'pending_payment'}</td><td>${b.current_plan||'starter'}</td><td>$${Number(b.amount_due||0).toFixed(2)}</td><td>$${Number(b.amount_paid||0).toFixed(2)}</td></tr>`}).join('')||'<tr><td colspan="5">No billing rows.</td></tr>';}init();</script></body></html>
