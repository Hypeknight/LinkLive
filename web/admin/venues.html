<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Venues</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js?v=v2full"></script><script src="/common/supabase.js?v=v2full"></script><script src="/common/auth-live.js?v=v2full"></script><script src="/common/nav.js?v=v2full"></script></head><body><div class="page-wrap"><div id="menu"></div><div class="card"><h2>Venues</h2><div class="table-wrap"><table><thead><tr><th>Name</th><th>Owner</th><th>Status</th><th>Searchable</th></tr></thead><tbody id="tb"></tbody></table></div></div></div><script>menu.innerHTML=LinkdNNav.admin();async function init(){const p=await LinkdNAuthLive.getProfile();if(!p||!['admin','moderator'].includes(p.role)){location.href='/auth/login.html';return}const {data,error}=await LinkdNSupabase.getClient().from('venues').select('name,venue_status,searchable,profiles:owner_profile_id(display_name,email)').order('created_at',{ascending:false});if(error){tb.innerHTML=`<tr><td colspan="4">${error.message}</td></tr>`;return}tb.innerHTML=(data||[]).map(v=>`<tr><td>${v.name}</td><td>${v.profiles?.display_name||v.profiles?.email||'-'}</td><td>${v.venue_status}</td><td>${v.searchable?'Yes':'No'}</td></tr>`).join('');}init();</script></body></html>
