<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Venues</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth-live.js"></script><script src="/common/ui.js"></script></head><body><div id="app"></div><script>async function init(){const p=await LinkdNAuthLive.requireRole(['moderator','admin']); if(!p) return; document.getElementById('app').innerHTML=`${LinkdNUI.topbar('Admin venue control', LinkdNUI.adminNav())}<div class="page-wrap"><div class="table-wrap"><table class="table"><thead><tr><th>Name</th><th>Owner</th><th>Status</th><th>Searchable</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table></div></div>`; LinkdNUI.bindLogout(LinkdNAuthLive.signOut); const sb=LinkdNSupabase.getClient(); const {data,error}=await sb.from('venues').select('id,name,venue_status,searchable,profiles:owner_profile_id(display_name,email)').order('created_at',{ascending:false}); const tbody=document.getElementById('rows'); if(error){tbody.innerHTML=`<tr><td colspan="5">${error.message}</td></tr>`;return;} tbody.innerHTML=(data||[]).map(v=>`<tr><td>${v.name}</td><td>${v.profiles?.display_name||v.profiles?.email||'-'}</td><td>${v.venue_status}</td><td>${v.searchable?'Yes':'No'}</td><td><button onclick="activateVenue('${v.id}')">Activate</button> <button onclick="pauseVenue('${v.id}')">Pause</button></td></tr>`).join('')||'<tr><td colspan="5">No venues.</td></tr>'; window.activateVenue=async id=>{await fetch(`${window.LINKDN_CONFIG.API_BASE}/api/admin/venue/${id}/activate`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'admin_override'})}); location.reload();}; window.pauseVenue=async id=>{await fetch(`${window.LINKDN_CONFIG.API_BASE}/api/admin/venue/${id}/pause`,{method:'POST',headers:{'Content-Type':'application/json'}}); location.reload();};} init();</script></body></html>
