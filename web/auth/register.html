<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Register Owner</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth.js"></script><script src="/common/ui.js"></script><script src="/common/nav.js"></script></head><body><div id="app"></div><script>document.getElementById('app').innerHTML=`${LinkdNV2UI.topbar("Register", LinkdNV2Nav.public)}<div class="page"><div class="form-card"><h2>Create Owner Account</h2><form id="f"><div class="row"><div><label>Display Name</label><input name="display_name" required></div><div><label>Email</label><input name="email" type="email" required></div></div><div class="row" style="margin-top:14px"><div><label>Password</label><input name="password" type="password" required></div><div><label>Role</label><input value="venue_owner" disabled></div></div><div class="actions"><button type="submit">Register</button></div></form><p id="s" class="notice" style="display:none;margin-top:14px"></p></div></div>`;document.getElementById('f').addEventListener('submit',async e=>{e.preventDefault();const s=document.getElementById('s');s.style.display='none';const data=Object.fromEntries(new FormData(e.target).entries());try{const r=await LinkdNV2Auth.signUp(data);s.style.display='block';s.textContent=r.error?.message||'Signup request sent. Finish profile setup in Supabase-backed flow.';}catch(err){s.style.display='block';s.textContent=err.message||'Signup failed.';}});</script></body></html>
