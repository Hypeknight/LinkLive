<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Register</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth-live.js"></script></head><body><div class="page-wrap"><div class="form-card"><h2>Create owner account</h2><form id="form" class="form-stack"><input name="display_name" placeholder="Display name" required><input type="email" name="email" placeholder="Email" required><input type="password" name="password" placeholder="Password" required><div class="form-actions"><button type="submit">Register</button></div></form><p id="status" class="notice hidden"></p></div></div><script>const f=document.getElementById('form'),s=document.getElementById('status');f.addEventListener('submit',async e=>{e.preventDefault();s.classList.add('hidden');try{const data=Object.fromEntries(new FormData(f).entries());await LinkdNAuthLive.signUp({...data, role:'owner'});s.textContent='Account created. Log in.';s.classList.remove('hidden');setTimeout(()=>location.href='/auth/login.html',900);}catch(err){s.textContent=err.message||'Registration failed';s.classList.remove('hidden')}});</script></body></html>
