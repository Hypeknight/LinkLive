<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth.js"></script><script src="/common/ui.js"></script><script src="/common/nav.js"></script></head><body><div id="app"></div><script>document.getElementById('app').innerHTML=`${LinkdNV2UI.topbar("Login", LinkdNV2Nav.public)}<div class="page"><div class="form-card"><h2>Login</h2><form id="f"><label>Email</label><input name="email" type="email" required><label style="margin-top:14px">Password</label><input name="password" type="password" required><div class="actions"><button type="submit">Login</button></div></form><p id="s" class="notice" style="display:none;margin-top:14px"></p></div></div>`;document.getElementById('f').addEventListener('submit',async e=>{e.preventDefault();const s=document.getElementById('s');s.style.display='none';const data=Object.fromEntries(new FormData(e.target).entries());try{const r=await LinkdNV2Auth.signIn(data.email,data.password);if(r.error) throw r.error;location.href='/owner/dashboard.html';}catch(err){s.style.display='block';s.textContent=err.message||'Login failed.';}});</script></body></html>
