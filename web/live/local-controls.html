<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Controls</title>
  <link rel="stylesheet" href="assets/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</head>
<body data-page="controls">
  <header>
    <div class="topbar">
      <div class="brand">Live Venue Control <small data-venue></small></div>
      <div class="badge"><span data-mode></span></div>
    </div>
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="ops.html">Ops</a>
      <a href="rooms.html">Rooms</a>
      <a href="scheduling.html">Scheduling</a>
      <a href="patron-pulse.html">Patron Pulse</a>
      <a href="local-controls.html">Local Controls</a>
      <a href="device-settings.html">Device Settings</a>
    </nav>
  </header>
  <main>
    
<section class="grid">
  <div class="card span-5">
    <h2>Local Camera/Mic Controls</h2>
    <label>Room</label><select id="controlRoomId"></select>
    <label>Camera Input</label><select id="localCamId"></select>
    <label>Microphone Input</label><select id="localMicId"></select>
    <button id="startPreviewBtn" class="btn primary" type="button">Start Preview</button>
    <button id="stopPreviewBtn" class="btn" type="button">Stop Preview</button>
    <button id="saveLocalMapBtn" class="btn" type="button">Map Devices to Room</button>
    <p id="previewStatus" class="muted small">Preview idle</p>
    <hr>
    <p class="small muted">Use this page on the local machine that has the show camera and mic attached. Most browsers require HTTPS or localhost for media access.</p>
  </div>
  <div class="card span-7">
    <h2>Preview</h2>
    <video id="previewVideo" autoplay muted playsinline></video>
  </div>
</section>

  </main>
  <script>
    const links = [...document.querySelectorAll('nav a')];
    const current = location.pathname.split('/').pop() || 'index.html';
    links.forEach(a => { if (a.getAttribute('href') === current) a.classList.add('active'); });
  </script>
</body>
</html>
