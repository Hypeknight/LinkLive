<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheduling | Live Venue Control</title>
  <link rel="stylesheet" href="assets/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script defer src="assets/js/app.js"></script>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">Live Venue Control</div>
    <div class="sub">Moderator + live operations stack</div>
    <div class="badge">Venue: <span id="venue-badge"></span></div>
    <nav class="nav">
      <a href="index.html" >Show Dashboard</a>
      <a href="rooms.html" >Rooms</a>
      <a href="scheduling.html" class="active">Scheduling</a>
      <a href="ops.html" >Ops</a>
      <a href="patron-pulse.html" >Patron Pulse</a>
      <a href="local-controls.html" >Local Controls</a>
      <a href="device-settings.html" >Device Settings</a>
    </nav>
  </aside>
  <main class="main">
    <div class="header">
      <div class="title">
        <h1>Scheduling</h1>
        <p>Manage show blocks and room timing from the moderator side.</p>
      </div>
      <div class="meta">
        <div id="connection-state" class="connection offline"></div>
      </div>
    </div>
    <div id="flash-host" class="flash-host"></div>
    <section data-page="scheduling" class="two-up">
  <div class="card">
    <h3 id="schedule-form-title">Add Schedule</h3>
    <form id="schedule-form">
      <label>Title<input name="title" required></label>
      <label>Room<select name="room_id" id="schedule-room-id"></select></label>
      <label>Start<input name="start_at" type="datetime-local" required></label>
      <label>End<input name="end_at" type="datetime-local"></label>
      <label>Lead name<input name="lead_name"></label>
      <label>Status<select name="status"><option value="scheduled">Scheduled</option><option value="live">Live</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select></label>
      <div class="button-row"><button type="submit">Save Schedule</button><button id="schedule-form-reset" type="button" class="secondary">Reset</button></div>
    </form>
  </div>
  <div class="card">
    <h3>Schedule Board</h3>
    <table>
      <thead><tr><th>Title</th><th>Room</th><th>Start</th><th>End</th><th>Lead</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="schedule-table"></tbody>
    </table>
  </div>
</section>
  </main>
</div>

</body>
</html>
