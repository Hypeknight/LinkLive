<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Settings</title>
  <link rel="stylesheet" href="assets/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</head>
<body data-page="devices">
  <header>
    <div class="topbar">
      <div class="brand">Live Venue Control <small data-venue></small></div>
      <div class="badge"><span data-mode></span></div>
    </div>
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="ops.html">Ops</a>
      <a href="rooms.html">Rooms</a>
      <a href="scheduling.html">Scheduling</a>
      <a href="patron-pulse.html">Patron Pulse</a>
      <a href="local-controls.html">Local Controls</a>
      <a href="device-settings.html">Device Settings</a>
    </nav>
  </header>
  <main>
    
<section class="grid">
  <div class="card span-5">
    <h2>Add Device</h2>
    <form id="deviceForm">
      <label>Device Name</label><input name="name" required>
      <div class="row">
        <div class="col-4"><label>Type</label><select name="type"><option>camera</option><option>microphone</option><option>speaker</option><option>display</option></select></div>
        <div class="col-4"><label>Status</label><select name="status"><option selected>online</option><option>offline</option><option>maintenance</option></select></div>
        <div class="col-4"><label>Room ID</label><input name="room_id" placeholder="optional"></div>
      </div>
      <label>Browser/Input Device ID</label><input name="input_id" placeholder="optional local device id">
      <label>Settings JSON</label><textarea name="settings_json">{"resolution":"1920x1080"}</textarea>
      <label><input type="checkbox" name="is_default"> Default Device</label>
      <button class="btn primary" type="submit">Save Device</button>
    </form>
  </div>
  <div class="card span-7">
    <h2>Devices</h2>
    <div class="table-wrap"><table><thead><tr><th>Name</th><th>Type</th><th>Status</th><th>Room</th><th>Input</th><th>Settings</th></tr></thead><tbody id="deviceBody"></tbody></table></div>
  </div>
</section>

  </main>
  <script>
    const links = [...document.querySelectorAll('nav a')];
    const current = location.pathname.split('/').pop() || 'index.html';
    links.forEach(a => { if (a.getAttribute('href') === current) a.classList.add('active'); });
  </script>
</body>
</html>
