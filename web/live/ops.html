<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ops | Live Venue Control</title>
  <link rel="stylesheet" href="assets/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script defer src="assets/js/app.js"></script>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">Live Venue Control</div>
    <div class="sub">Moderator + live operations stack</div>
    <div class="badge">Venue: <span id="venue-badge"></span></div>
    <nav class="nav">
      <a href="index.html" >Show Dashboard</a>
      <a href="rooms.html" >Rooms</a>
      <a href="scheduling.html" >Scheduling</a>
      <a href="ops.html" class="active">Ops</a>
      <a href="patron-pulse.html" >Patron Pulse</a>
      <a href="local-controls.html" >Local Controls</a>
      <a href="device-settings.html" >Device Settings</a>
    </nav>
  </aside>
  <main class="main">
    <div class="header">
      <div class="title">
        <h1>Ops</h1>
        <p>Track venue incidents, priorities, and operator assignments.</p>
      </div>
      <div class="meta">
        <div id="connection-state" class="connection offline"></div>
      </div>
    </div>
    <div id="flash-host" class="flash-host"></div>
    <section data-page="ops" class="two-up">
  <div class="card">
    <h3 id="ops-form-title">Add Ops Note</h3>
    <form id="ops-form">
      <label>Title<input name="title" required></label>
      <label>Room<select name="room_id" id="ops-room-id"></select></label>
      <label>Priority<select name="priority"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></label>
      <label>Status<select name="status"><option value="open">Open</option><option value="in_progress">In Progress</option><option value="closed">Closed</option></select></label>
      <label>Assigned to<input name="assigned_to" placeholder="Ops lead, security, audio, etc."></label>
      <label>Note<textarea name="note"></textarea></label>
      <div class="button-row"><button type="submit">Save Note</button><button id="ops-form-reset" type="button" class="secondary">Reset</button></div>
    </form>
  </div>
  <div class="card">
    <h3>Open Items</h3>
    <table>
      <thead><tr><th>Title</th><th>Room</th><th>Priority</th><th>Status</th><th>Assigned</th><th>Note</th><th>Created</th><th>Actions</th></tr></thead>
      <tbody id="ops-table"></tbody>
    </table>
  </div>
</section>
  </main>
</div>

</body>
</html>
