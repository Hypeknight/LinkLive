<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moderator Scheduling</title>
  <link rel="stylesheet" href="/common/app.css" />

  <script src="/common/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/common/supabase.js"></script>
  <script src="/common/db.js"></script>
  <script src="/common/ui.js"></script>
  <script src="/common/auth.js"></script>
  <script src="/live/assets/js/moderator.js"></script>

  <style>
    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 16px;
      align-items: start;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input,
    textarea,
    select {
      width: 100%;
    }

    @media (max-width: 980px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-page="moderator-scheduling">
  <div class="shell">
    <aside class="sidebar">
      <div class="brand-row">
        <span class="brand-mark"></span>
        <div>
          <div class="brand" data-app-name></div>
          <div class="sub">Moderator side</div>
        </div>
      </div>

      <nav class="nav">
        <a href="/live/moderator/rooms.html">Rooms</a>
        <a class="active" href="/live/moderator/scheduling.html">Scheduling</a>
      </nav>
    </aside>

    <main class="main">
      <header class="header">
        <div>
          <h1>Scheduling</h1>
          <p>Master scheduling for room segments, timing, and production flow.</p>
        </div>
        <div class="header-right">
          <div id="current-user"></div>
          <div id="connection-state" class="connection offline" data-connection-status>Offline</div>
          <button id="logout-button" class="secondary" type="button">Logout</button>
        </div>
      </header>

      <div id="flash-host"></div>

      <section class="grid-2">
        <article class="card">
          <h3 id="schedule-form-title">Add Schedule Item</h3>

          <form id="schedule-form" class="stack">
            <label>
              Room
              <select name="room_id"></select>
            </label>

            <label>
              Segment Title
              <input name="segment_title" placeholder="Freestyle Round 1" />
            </label>

            <label>
              Segment Type
              <input name="segment_type" placeholder="battle, freestyle, reaction..." />
            </label>

            <label>
              Description
              <textarea name="description" rows="4" placeholder="Optional notes for the segment..."></textarea>
            </label>

            <label>
              Lead Name
              <input name="lead_name" placeholder="DJ, host, or moderator lead" />
            </label>

            <label>
              Starts At
              <input type="datetime-local" name="starts_at" />
            </label>

            <label>
              Ends At
              <input type="datetime-local" name="end_at" />
            </label>

            <div class="button-row">
              <button type="submit">Save Schedule Item</button>
              <button type="button" class="secondary" id="schedule-form-reset">Reset</button>
            </div>
          </form>
        </article>

        <article class="card">
          <div class="button-row" style="justify-content:space-between;align-items:center;margin-bottom:12px;">
            <h3 style="margin:0;">Schedule Items</h3>
            <div style="min-width:220px;">
              <label style="display:block;">
                Filter by Room
                <select id="schedule-room-filter"></select>
              </label>
            </div>
          </div>

          <table>
            <thead>
              <tr>
                <th>Room</th>
                <th>Segment</th>
                <th>Start</th>
                <th>End</th>
                <th>Type</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="moderator-schedule-table-body"></tbody>
          </table>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
