<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Patron Pulse</title>
        <link rel="stylesheet" href="/common/app.css">
        <script src="/common/config.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="/common/supabase.js"></script>
        <script src="/common/db.js"></script>
        <script src="/common/ui.js"></script>
        <script src="/common/auth.js"></script>
        <script src="/live/assets/js/moderator.js"></script>
    </head>
    <body data-page="moderator-pulse">
        <div class="shell">
            <aside class="sidebar">
                <div class="brand-row">
                    <span class="brand-mark"></span>
                    <div>
                        <div class="brand" data-app-name></div>
                        <div class="sub">Moderator side</div>
                    </div>
                </div>
                <nav class="nav">
            <a href="/live/moderator/dashboard.html">Dashboard</a>
            <a href="/live/moderator/rooms.html">Rooms</a>
            <a href="/live/moderator/scheduling.html">Scheduling</a>
            <a href="/live/moderator/ops.html">Ops</a>
            <a class="active" href="/live/moderator/patron-pulse.html">Patron Pulse</a>
            <a href="/live/moderator/local-controls.html">Local Controls</a>
            <a href="/live/moderator/device-settings.html">Device Settings</a>
            <!-- <a href="/venue/dashboard.html">Venue View</a> -->
        </nav>
            </aside>
            <main class="main">
  <header class="header">
    <div>
      <h1>Patron Pulse</h1>
      <p>Log live crowd response and room energy.</p>
    </div>
    <div class="header-right">
      <div id="current-user"></div>
      <div id="connection-state" class="connection offline"></div>
      <button id="logout-button" class="secondary">Logout</button>
    </div>
  </header>

  <div id="flash-host"></div>

  <section class="grid cols-2">
    <article class="card">
      <h3>New Pulse Entry</h3>
      <form id="pulse-form" class="stack">
        <label>
          Room
          <select name="room_id"></select>
        </label>

        <label>
          Pulse Score
          <input type="number" name="pulse_score" min="0" max="100" value="0" />
        </label>

        <label>
          Crowd Count
          <input type="number" name="crowd_count" min="0" value="0" />
        </label>

        <label>
          Energy Level
          <input type="number" name="energy_level" min="1" max="10" value="1" />
        </label>

        <label>
          Source
          <input name="source" value="moderator" />
        </label>

        <label>
          Notes
          <textarea name="notes" rows="5"></textarea>
        </label>

        <div class="button-row">
          <button type="submit">Save Pulse</button>
        </div>
      </form>
    </article>

    <article class="card">
      <h3>Recent Pulse</h3>
      <table>
        <thead>
          <tr>
            <th>Room</th>
            <th>Pulse</th>
            <th>Crowd</th>
            <th>Energy</th>
            <th>Source</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody id="pulse-table-body">
        </tbody>
      </table>
    </article>
  </section>
</main>
        </div >
    </body >
</html >
