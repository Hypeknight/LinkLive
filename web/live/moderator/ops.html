<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ops</title>
        <link rel="stylesheet" href="/common/app.css">
        <script src="/common/config.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="/common/supabase.js"></script>
        <script src="/common/db.js"></script>
        <script src="/common/ui.js"></script>
        <script src="/common/auth.js"></script>
        <script src="/live/assets/js/venue.js"></script>
    </head>
    <body data-page="moderator-ops">
        <div class="shell">
            <aside class="sidebar">
                <div class="brand-row">
                    <span class="brand-mark"></span>
                    <div>
                        <div class="brand" data-app-name></div>
                        <div class="sub">Moderator side</div>
                    </div>
                </div>
                <nav class="nav">
            <a href="/live/moderator/dashboard.html">Dashboard</a>
            <a href="/live/moderator/rooms.html">Rooms</a>
            <a href="/live/moderator/scheduling.html">Scheduling</a>
            <a class="active" href="/live/moderator/ops.html">Ops</a>
            <a href="/live/moderator/patron-pulse.html">Patron Pulse</a>
            <a href="/live/moderator/local-controls.html">Local Controls</a>
            <a href="/live/moderator/device-settings.html">Device Settings</a>
            <!-- <a href="/venue/dashboard.html">Venue View</a> -->
        </nav>
            </aside>
            <main class="main">
  <header class="header">
    <div>
      <h1>Ops Notes</h1>
      <p>Track incidents, assignments, and follow-through.</p>
    </div>
    <div class="header-right">
      <div id="current-user"></div>
      <div id="connection-state" class="connection offline"></div>
      <button id="logout-button" class="secondary">Logout</button>
    </div>
  </header>

  <div id="flash-host"></div>

  <section class="grid cols-2">
    <article class="card">
      <h3>Add / Edit Ops Note</h3>
      <form id="ops-form" class="stack">
        <label>
          Room
          <select name="room_id"></select>
        </label>

        <label>
          Title
          <input name="title" required />
        </label>

        <label>
          Priority
          <select name="priority">
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
          </select>
        </label>

        <label>
          Status
          <select name="status">
            <option value="open">open</option>
            <option value="in_progress">in_progress</option>
            <option value="closed">closed</option>
          </select>
        </label>

        <label>
          Assigned To
          <input name="assigned_to" />
        </label>

        <label>
          Note
          <textarea name="note" rows="5"></textarea>
        </label>

        <div class="button-row">
          <button type="submit">Save Note</button>
          <button type="button" class="secondary" id="ops-form-reset">Reset</button>
        </div>
      </form>
    </article>

    <article class="card">
      <h3>Ops Notes</h3>
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Room</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Assigned</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ops-table-body">
        </tbody>
      </table>
    </article>
  </section>
</main>
        </div >
    </body >
</html >
