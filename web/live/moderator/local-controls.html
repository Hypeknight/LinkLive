<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Controls</title>
    <link rel="stylesheet" href="/common/app.css" />
    <script src="/common/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/common/supabase.js"></script>
    <script src="/common/db.js"></script>
    <script src="/common/ui.js"></script>
    <script src="/common/auth.js"></script>
    <script src="/live/assets/js/moderator.js"></script>
  </head>
  <body data-page="moderator-local-controls">
    <div class="shell">
      <aside class="sidebar">
        <div class="brand-row">
          <span class="brand-mark"></span>
          <div>
            <div class="brand" data-app-name></div>
            <div class="sub">Moderator side</div>
          </div>
        </div>

        <nav class="nav">
          <a href="/live/moderator/dashboard.html">Dashboard</a>
          <a href="/live/moderator/rooms.html">Rooms</a>
          <a href="/live/moderator/scheduling.html">Scheduling</a>
          <a href="/live/moderator/ops.html">Ops</a>
          <a href="/live/moderator/patron-pulse.html">Patron Pulse</a>
          <a class="active" href="/live/moderator/local-controls.html">Local Controls</a>
          <a href="/live/moderator/device-settings.html">Device Settings</a>
        </nav>
      </aside>

      <main class="main">
        <header class="header">
          <div>
            <h1>Local Controls</h1>
            <p>Preview browser camera and mic, then map them to a room.</p>
          </div>
          <div class="header-right">
            <div id="current-user"></div>
            <div id="connection-state" class="connection offline" data-connection-status>Offline</div>
            <button id="logout-button" class="secondary" type="button">Logout</button>
          </div>
        </header>

        <div id="flash-host"></div>

        <section class="grid cols-2">
          <article class="card">
            <h3>Preview</h3>

            <div class="button-row">
              <button type="button" id="request-media">Grant Camera + Mic</button>
              <button type="button" class="secondary" id="start-preview">Start Preview</button>
              <button type="button" class="secondary" id="stop-preview">Stop Preview</button>
            </div>

            <label>
              Camera
              <select id="local-camera-device"></select>
            </label>

            <label>
              Microphone
              <select id="local-mic-device"></select>
            </label>

            <video id="local-video" class="preview" autoplay muted playsinline></video>
            <div id="stream-info" class="helper">Preview is idle.</div>
          </article>

          <article class="card">
            <h3>Room Mapping</h3>

            <label>
              Room
              <select id="local-room-id"></select>
            </label>

            <div class="button-row">
              <button type="button" id="map-devices">Map Devices to Room + Set Live</button>
            </div>

            <table>
              <thead>
                <tr>
                  <th>Room</th>
                  <th>Camera</th>
                  <th>Mic</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="local-map-table"></tbody>
            </table>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
