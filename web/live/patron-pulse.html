<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patron Pulse</title>
  <link rel="stylesheet" href="assets/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</head>
<body data-page="pulse">
  <header>
    <div class="topbar">
      <div class="brand">Live Venue Control <small data-venue></small></div>
      <div class="badge"><span data-mode></span></div>
    </div>
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="ops.html">Ops</a>
      <a href="rooms.html">Rooms</a>
      <a href="scheduling.html">Scheduling</a>
      <a href="patron-pulse.html">Patron Pulse</a>
      <a href="local-controls.html">Local Controls</a>
      <a href="device-settings.html">Device Settings</a>
    </nav>
  </header>
  <main>
    
<section class="grid">
  <div class="card span-5">
    <h2>Log Patron Pulse</h2>
    <form id="pulseForm">
      <label>Room</label><select id="pulseRoomId" name="room_id"></select>
      <div class="row">
        <div class="col-4"><label>Pulse Score</label><input type="number" name="pulse_score" min="0" max="100" value="75"></div>
        <div class="col-4"><label>Crowd Count</label><input type="number" name="crowd_count" min="0" value="0"></div>
        <div class="col-4"><label>Energy 1-10</label><input type="number" name="energy_level" min="1" max="10" value="7"></div>
      </div>
      <label>Source</label><select name="source"><option selected>manual</option><option>camera</option><option>sales</option><option>sensor</option></select>
      <label>Notes</label><textarea name="notes"></textarea>
      <button class="btn primary" type="submit">Save Pulse</button>
    </form>
  </div>
  <div class="card span-7">
    <h2>Pulse History</h2>
    <div class="table-wrap"><table><thead><tr><th>Time</th><th>Room</th><th>Pulse</th><th>Crowd</th><th>Energy</th><th>Source</th></tr></thead><tbody id="pulseBody"></tbody></table></div>
  </div>
</section>

  </main>
  <script>
    const links = [...document.querySelectorAll('nav a')];
    const current = location.pathname.split('/').pop() || 'index.html';
    links.forEach(a => { if (a.getAttribute('href') === current) a.classList.add('active'); });
  </script>
</body>
</html>
