<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venue Patron Pulse</title>
  <link rel="stylesheet" href="/common/app.css" />
  <script src="/common/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/common/supabase.js"></script>
  <script src="/common/db.js"></script>
  <script src="/common/ui.js"></script>
  <script src="/common/auth.js"></script>
  <script src="/live/assets/js/venue.js"></script>
</head>
<body data-page="venue-pulse">
  <div class="shell venue-shell">
    <aside class="sidebar">
      <div class="brand-row"><span class="brand-mark"></span><div><div class="brand" data-app-name></div><div class="sub">Venue production</div></div></div>
      <div class="badge-row"><strong data-venue-name></strong></div>
      <nav class="nav">
        <a href="/live/venue/rooms.html">Rooms</a>
        <a href="/live/venue/production.html">Production</a>
        <a href="/live/venue/display.html">Display</a>
        <a class="active" href="/live/venue/patron-pulse.html">Patron Pulse</a>
        <a href="/live/venue/local-controls.html">Local Controls</a>
      </nav>
    </aside>
    <main class="main">
      <header class="header"><div><h1>Patron Pulse</h1><p>Show active pulse prompts, vote path, and venue pulse metrics.</p></div><div class="header-right"><div id="current-user"></div><div id="connection-state" class="connection offline" data-connection-status>Offline</div><button id="logout-button" class="secondary" type="button">Logout</button></div></header>
      <div id="flash-host"></div>
      <section class="grid cols-2">
        <article class="card"><h3>Active Prompt</h3><div id="venue-pulse-prompt"></div><div id="venue-pulse-qr" style="margin-top:12px"></div></article>
        <article class="card"><h3>Metrics</h3><div id="venue-pulse-metrics" class="stats-grid"></div></article>
      </section>
      <article class="card"><h3>Recent Pulse Entries</h3><table><thead><tr><th>Time</th><th>Pulse</th><th>Hype</th><th>Crowd</th><th>Notes</th></tr></thead><tbody id="venue-pulse-table"></tbody></table></article>
    </main>
  </div>
</body>
</html>
