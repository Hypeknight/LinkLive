<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Venue Wallboard</title>
        <link rel="stylesheet" href="/common/app.css">
        <script src="/common/config.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="/common/supabase.js"></script>
        <script src="/common/db.js"></script>
        <script src="/common/ui.js"></script>
        <script src="/common/auth.js"></script>
        <script src="/live/assets/js/venue.js"></script>
    </head>
    <body data-page="venue-wallboard" class="wallboard-body">
        <div class="wall-top">
            <div>
                <div class="wall-kicker" data-venue-name></div>
                <h1>Live Wallboard</h1>
            </div>
            <div class="wall-stats">
                <div class="wall-pill">Live Rooms <span id="wallboard-live-count">0</span></div>
                <div class="wall-pill">Avg Pulse <span id="wallboard-pulse">0%</span></div>
            </div>
        </div>
        <main id="wallboard-grid" class="wall-grid"></main>
    </body>
</html>
