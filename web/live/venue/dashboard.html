<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Venue Dashboard</title>
        <link rel="stylesheet" href="/common/app.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="/common/config.js"></script>
        <script src="/common/supabase.js"></script>
        <!--- <script src="/assets/js/common.js"></script> --->
        <script src="/common/auth.js"></script>
        <script src="/assets/js/venue.js"></script>
    </head>
    <body data-page="venue-dashboard">
        <div class="shell venue-shell">
            <aside class="sidebar">
                <div class="brand-row">
                    <span class="brand-mark"></span>
                    <div>
                        <div class="brand" data-app-name></div>
                        <div class="sub">Venue side</div>
                    </div>
                </div>
                <div class="badge-row">
                    <strong data-venue-name></strong>
                </div>
                <nav class="nav">
                    <a href="/venue/dashboard.html">Owner Dashboard</a>
                    <a class="active" href="/owner/dashboard.html">Dashboard</a>
                    <a href="/live/venue/rooms.html">Rooms</a>
                    <a href="/live/venue/schedule.html">Schedule</a>
                    <a href="/live/venue/pulse.html">Pulse</a>
                    <a href="/live/venue/wallboard.html">Wallboard</a>
                    <!-- <a href="/moderator/dashboard.html">Moderator</a> -->
                </nav>
            </aside>
            <main class="main">
                <header class="header">
                    <div>
                        <h1>Venue Dashboard</h1>
                        <p>Read-only live venue overview.</p>
                    </div>
                    <div class="header-right">
                        <div id="current-user"></div>
                        <div id="connection-state" class="connection offline"></div>
                        <button id="logout-button" class="secondary">Logout</button>
                    </div>
                </header>
                <div id="flash-host"></div>
                <section class="stats-grid">
                    <article class="card stat-card">
                        <div class="muted">Rooms</div>
                        <div class="stat" data-stat="rooms">0</div>
                    </article>
                    <article class="card stat-card">
                        <div class="muted">Live Rooms</div>
                        <div class="stat" data-stat="live">0</div>
                    </article>
                    <article class="card stat-card">
                        <div class="muted">Upcoming</div>
                        <div class="stat" data-stat="upcoming">0</div>
