<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Show Dashboard</title>
  <link rel="stylesheet" href="assets/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</head>
<body data-page="dashboard">
  <header>
    <div class="topbar">
      <div class="brand">Live Venue Control <small data-venue></small></div>
      <div class="badge"><span data-mode></span></div>
    </div>
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="ops.html">Ops</a>
      <a href="rooms.html">Rooms</a>
      <a href="scheduling.html">Scheduling</a>
      <a href="patron-pulse.html">Patron Pulse</a>
      <a href="local-controls.html">Local Controls</a>
      <a href="device-settings.html">Device Settings</a>
    </nav>
  </header>
  <main>
    
<section class="grid">
  <div class="card span-3"><div class="muted">Rooms</div><div id="kpiRooms" class="kpi">0</div></div>
  <div class="card span-3"><div class="muted">Devices</div><div id="kpiDevices" class="kpi">0</div></div>
  <div class="card span-3"><div class="muted">Live/Scheduled Shows</div><div id="kpiLiveShows" class="kpi">0</div></div>
  <div class="card span-3"><div class="muted">Current Pulse</div><div id="kpiPulse" class="kpi">0</div></div>
  <div class="card span-4">
    <h2>Room Status</h2>
    <div id="roomStatus" class="list"></div>
  </div>
  <div class="card span-8">
    <h2>Today’s Schedule</h2>
    <div class="table-wrap"><table><thead><tr><th>Start</th><th>Title</th><th>Status</th><th>Lead</th></tr></thead><tbody id="todaySchedule"></tbody></table></div>
  </div>
  <div class="card span-12">
    <h2>Pulse Feed</h2>
    <div id="pulseFeed" class="grid"></div>
  </div>
</section>

  </main>
  <script>
    const links = [...document.querySelectorAll('nav a')];
    const current = location.pathname.split('/').pop() || 'index.html';
    links.forEach(a => { if (a.getAttribute('href') === current) a.classList.add('active'); });
  </script>
</body>
</html>
