<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Local Controls</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/livekit-client/2.15.7/livekit-client.umd.js"></script><script src="/common/config.js?v=v2full"></script><script src="/common/livekit.js?v=v2full"></script><script src="/common/nav.js?v=v2full"></script></head><body><div class="page-wrap"><div id="menu"></div><div class="form-card"><h2>Local Controls</h2><p id="status" class="notice">Ready.</p><label>Room Name</label><input id="roomName" value="central-battle-room"><label style="margin-top:14px">Identity</label><input id="identity" value="venue-local-node"><div class="form-actions"><button type="button" id="connect">Connect</button><button type="button" id="disconnect">Disconnect</button><button type="button" id="camOn">Camera On</button><button type="button" id="camOff">Camera Off</button><button type="button" id="micOn">Mic On</button><button type="button" id="micOff">Mic Off</button></div></div></div><script>menu.innerHTML=LinkdNNav.venue();function setStatus(m){status.textContent=m}connect.onclick=async()=>{try{await LinkdNLiveKit.connectStub();setStatus('LiveKit stub loaded. Replace with token/room flow when backend route is mounted.');}catch(err){console.error(err);setStatus(err.message||'Could not connect.')}};disconnect.onclick=()=>setStatus('Disconnected.');camOn.onclick=()=>setStatus('Camera on action ready.');camOff.onclick=()=>setStatus('Camera off action ready.');micOn.onclick=()=>setStatus('Mic on action ready.');micOff.onclick=()=>setStatus('Mic off action ready.');</script></body></html>
