<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Venue Metrics</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script></head><body><div class="page-wrap"><div id="status" class="notice">Loading metrics...</div></div><script>async function init(){const qp=new URLSearchParams(location.search); const venueId=qp.get('venue'); const sb=LinkdNSupabase.getClient(); const {data,error}=await sb.from('venue_metrics').select('*').eq('venue_id',venueId).single(); document.getElementById('status').textContent=error?(error.message||'Could not load metrics'):JSON.stringify(data,null,2);} init();</script></body></html>
