<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Venue Dashboard</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth-live.js"></script><script src="/common/ui.js"></script></head><body><div id="app"></div><script>async function init(){const user=await LinkdNAuthLive.getProfile(); if(!user) return location.href='/auth/login.html'; const qp=new URLSearchParams(location.search); const venueId=qp.get('venue'); document.getElementById('app').innerHTML=`${LinkdNUI.topbar('Venue dashboard', LinkdNUI.venueNav())}<div class="page-wrap"><div id="summary" class="notice">Loading venue...</div></div>`; const sb=LinkdNSupabase.getClient(); let data,error; if(venueId){({data,error}=await sb.from('venues').select('*').eq('id',venueId).single());} else {({data,error}=await sb.from('venues').select('*').eq('owner_profile_id',user.id).limit(1).single());} document.getElementById('summary').textContent=error?(error.message||'Could not load venue'):`${data.name} - ${data.venue_status} - ${data.city||''}, ${data.state||''}`;} init();</script></body></html>
