<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Device Setup</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/livekit-client/2.15.7/livekit-client.umd.js"></script><script src="/common/config.js?v=v2full"></script><script src="/common/livekit.js?v=v2full"></script><script src="/common/nav.js?v=v2full"></script></head><body><div class="page-wrap"><div id="menu"></div><div class="form-card"><h2>Device Setup</h2><p id="status" class="notice">Grant access, then save devices.</p><div class="form-actions"><button type="button" id="grant">Allow Camera & Mic Access</button><button type="button" id="refresh">Refresh Devices</button><button type="button" id="save">Save Devices</button></div><div class="form-row" style="margin-top:16px"><div><label>Camera</label><select id="camera"></select></div><div><label>Audio</label><select id="audio"></select></div></div></div></div><script>menu.innerHTML=LinkdNNav.venue();function setStatus(m){status.textContent=m}async function load(){try{const {videoInputs,audioInputs}=await LinkdNLiveKit.listDevices();camera.innerHTML=videoInputs.map((d,i)=>`<option value="${d.deviceId}">${d.label||('Camera '+(i+1))}</option>`).join('')||'<option value="">No cameras</option>';audio.innerHTML=audioInputs.map((d,i)=>`<option value="${d.deviceId}">${d.label||('Audio '+(i+1))}</option>`).join('')||'<option value="">No audio</option>';const saved=JSON.parse(localStorage.getItem('linkdn_device_setup')||'{}');if(saved.cameraId) camera.value=saved.cameraId;if(saved.audioId) audio.value=saved.audioId;setStatus('Devices loaded.');}catch(err){console.error(err);setStatus(err.message||'Could not load devices.')}}grant.onclick=async()=>{try{await navigator.mediaDevices.getUserMedia({video:true,audio:true});await load();setStatus('Permission granted.')}catch(err){setStatus(err.message||'Permission denied.')}};refresh.onclick=load;save.onclick=()=>{localStorage.setItem('linkdn_device_setup',JSON.stringify({cameraId:camera.value,audioId:audio.value,cameraName:camera.options[camera.selectedIndex]?.text||'',audioName:audio.options[audio.selectedIndex]?.text||''}));setStatus('Saved preferred devices.');};load();</script></body></html>
