<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Device Setup</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/livekit-client/2.15.7/livekit-client.umd.js"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/ui.js"></script></head><body><div id="app"></div><script>document.getElementById('app').innerHTML=`${LinkdNUI.topbar('Device setup', LinkdNUI.venueNav())}<div class="page-wrap"><div class="form-card"><div class="notice" id="status">Grant access first.</div><div class="form-actions"><button id="grantBtn">Allow camera & mic</button><button id="saveBtn">Save devices</button></div><div class="form-row"><select id="cameraSelect"></select><select id="audioSelect"></select></div></div></div>`; async function load(){try{await navigator.mediaDevices.getUserMedia({video:true,audio:true}); const devices=await navigator.mediaDevices.enumerateDevices(); const cams=devices.filter(d=>d.kind==='videoinput'); const auds=devices.filter(d=>d.kind==='audioinput'); document.getElementById('cameraSelect').innerHTML=cams.map((d,i)=>`<option value="${d.deviceId}">${d.label||`Camera ${i+1}`}</option>`).join('')||'<option value="">No cameras</option>'; document.getElementById('audioSelect').innerHTML=auds.map((d,i)=>`<option value="${d.deviceId}">${d.label||`Audio ${i+1}`}</option>`).join('')||'<option value="">No audio</option>'; document.getElementById('status').textContent='Devices loaded'; const saved=JSON.parse(localStorage.getItem('linkdn_device_setup')||'{}'); if(saved.cameraId) document.getElementById('cameraSelect').value=saved.cameraId; if(saved.audioId) document.getElementById('audioSelect').value=saved.audioId;}catch(err){document.getElementById('status').textContent=err.message||'Could not load devices';}} document.getElementById('grantBtn').addEventListener('click',load); document.getElementById('saveBtn').addEventListener('click',()=>{localStorage.setItem('linkdn_device_setup',JSON.stringify({cameraId:document.getElementById('cameraSelect').value,audioId:document.getElementById('audioSelect').value,cameraName:document.getElementById('cameraSelect').selectedOptions[0]?.text||'',audioName:document.getElementById('audioSelect').selectedOptions[0]?.text||''})); document.getElementById('status').textContent='Saved preferred devices';});</script></body></html>
