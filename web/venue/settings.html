<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Venue Settings</title><link rel="stylesheet" href="/common/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/common/config.js"></script><script src="/common/supabase.js"></script><script src="/common/auth-live.js"></script><script src="/common/ui.js"></script></head><body><div id="app"></div><script>async function init(){const user=await LinkdNAuthLive.getProfile(); if(!user) return location.href='/auth/login.html'; const qp=new URLSearchParams(location.search); const venueId=qp.get('venue'); document.getElementById('app').innerHTML=`${LinkdNUI.topbar('Venue settings', LinkdNUI.venueNav())}<div class="page-wrap"><div class="form-card"><h2>Venue settings</h2><form id="form" class="form-stack"><label><input type="checkbox" id="patron_pulse_enabled"> Patron Pulse enabled</label><label><input type="checkbox" id="public_visibility"> Public visibility</label><label><input type="checkbox" id="allow_outgoing_messages"> Allow outgoing messages</label><label><input type="checkbox" id="allow_private_event_requests"> Allow private event requests</label><div class="form-actions"><button type="submit">Save settings</button></div></form><p id="status" class="notice hidden"></p></div></div>`; const sb=LinkdNSupabase.getClient(); const {data,error}=await sb.from('venue_settings').select('*').eq('venue_id',venueId).single(); if(data){for(const k of ['patron_pulse_enabled','public_visibility','allow_outgoing_messages','allow_private_event_requests']) document.getElementById(k).checked=!!data[k];} document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault(); const payload={venue_id:venueId, patron_pulse_enabled:document.getElementById('patron_pulse_enabled').checked, public_visibility:document.getElementById('public_visibility').checked, allow_outgoing_messages:document.getElementById('allow_outgoing_messages').checked, allow_private_event_requests:document.getElementById('allow_private_event_requests').checked}; const r=await sb.from('venue_settings').upsert(payload,{onConflict:'venue_id'}); const s=document.getElementById('status'); s.classList.remove('hidden'); s.textContent=r.error?(r.error.message||'Could not save'):'Settings saved.';});} init();</script></body></html>
